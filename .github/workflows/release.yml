name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            artifact: codex-su-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: codex-su-darwin-arm64
          - goos: linux
            goarch: amd64
            artifact: codex-su-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: codex-su-linux-arm64
          - goos: windows
            goarch: amd64
            artifact: codex-su-windows-amd64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/${{ matrix.artifact }}" ./cmd/codex-su

      - name: Generate checksum
        run: shasum -a 256 "dist/${{ matrix.artifact }}" > "dist/${{ matrix.artifact }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256

      - name: Publish GitHub Release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
          fail_on_unmatched_files: true
  package-manager-plan:
    name: NPM package release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Stage npm platform binaries
        run: npm run stage:npm-binaries

      - name: Validate npm packages
        run: |
          npm pack --dry-run
          for package_dir in npm/packages/*; do
            npm pack --dry-run "$package_dir"
          done

      - name: Publish npm platform packages
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          for package_dir in npm/packages/*; do
            npm publish "$package_dir" --access public --provenance
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish root npm package
        if: startsWith(github.ref, 'refs/tags/')
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
