name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go:
    name: Go CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run CI checks
        run: go test ./...

      - name: Build binary
        run: go build -o bin/codex-su ./cmd/codex-su
